<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> EXEMPLO 02 Formulario</title>
    <link rel="styleheet" href='../normalize.css'>
    <style rel="styleheet">
        *,*:before, *after{
            -webkit-box-sizing: border-box;
                -moz-box-sizing: border-box;
                    box-sizing: border-box;
 }

    .menu-select{
        float: 18px/1.4 arial,sans-serif;
        color:  #333;
        background: #ccc;

    }
    
    #tudo{
        width:100%;
        max-width: 1200px;
        min-width: 860px;
        margin: 0 auto;
        background: #fff;
    }
    .clear{clear:both;}

    body{
        font: 18px/1.4 arial,sans-serif;
        color:#333;
        background: #ccc;

    }

    h1,h2,h3,h4,h5,h6{
        color:#036;

    }
    main h1{
        margin-top: -25px;}

        .topo_hearder{
            background: #036;
            padding: 5px 20px;
        }

    
    .topo_hearder h1{
        font-size: 36px;
        margin: 4px 0 2px 0;
    }


    .topo_hearder a{
        color: #fff;
        text-decoration: none;
    }
        
    .topo_hearder h2{
        font-size: 20px;
        margin: 2px 0 4px 0;
        color: #fff;
    }

    .principal{
        width: 100%;
        padding: 20px 15px ;
    }

    .rodape{
        background: #036;
        color: #fff;
        padding: 5px 0;
        text-align: center;
    }

    pre{font-size: 14px;}

    @media(max-width:1040px ){
        pre{font-size: 12px;}
    }
    
    /* campo de formularios*/


    button, select, .bck{
        display: block;
        margin-bottom: 25px;
    }

    label[for="msg"]{
        display: block;
    }
    </style>
</head>

<body class="home">
    <div id="tudo">
    <div class="topo">
        <header class="topo_hearder">
            <hgroup>
                <h1><a href="/">formularios</a></h1>
                <h2>campos</h2>
            </hgroup>
         </header>
    </div><!--/.topo-->

        <div class="principal">
            <main>
                <section>
                    <h1> Mais elementos para campos de formulario</h1>

                    <form>
                        <button type="button">Botão</button>
                        <select>
                            <optgroup label="frutas">
                                <option>Abacaxi</option>
                                <option>Banana</option>
                                <option>Laranja</option>
                            </optgroup>

                            <optgroup label="Bairros">
                                <option>Boa vista</option>
                                <option>Rafael Ribeiro</option>
                                <option>Iririu</option>
                            </optgroup>
                        </select>


                        <label class="bck">Sexo
                            <input name="sexo" list="sexos">
                                <datalist id="sexos">
                                    <option value="Feminino">
                                    <option value="Masculino">
                                </datalist>

                        </label>

                        <label for="msg">Sua mensagem</label>
                        <textarea id="msg" rows="6" cols="30"></textarea>
                    </form>
                </section>
            </main>
        </div> <!--/.principal-->

        <div class="rodape">
            <footer>
                <small>Pagina Desenvolvida por Rafael Ribeiro</small>
            </footer>
        </div> <!--/.rodape-->
    </div> <!--/.tudo-->
</address>

</body>
</html>
